
name:  Love_Thy_Neighbor

version: "3.9"

services:
  php:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./php:/var/www/html
      - ./images/uploads:/var/www/uploads
      - ./apache-config.conf:/etc/apache2/conf-enabled/zz-dir-browsing.conf

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    volumes:
      - ./phpmyadmin-config.inc.php:/etc/phpmyadmin/config.user.inc.php:ro

  image-nginx:
    image: nginx:alpine
    container_name: image-nginx
    ports:
      - "8082:80"
    volumes:
      - ./images/uploads:/usr/share/nginx/html/uploads:ro
      - ./nginx-images/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped    

volumes:
  db_data:

